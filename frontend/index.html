<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InstaLite</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav id="navbar"></nav>
  <main id="app"></main>

  <div id="toast-container"></div>

  <div id="api-log" class="api-log collapsed">
    <div class="api-log-header" onclick="toggleApiLog()">
      <span>API Activity Log</span>
      <span id="api-log-count" class="api-log-badge">0</span>
      <span id="api-log-toggle">&#9650;</span>
    </div>
    <div class="api-log-entries" id="api-log-entries"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/components.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/feed.js"></script>
  <script src="js/post.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/search.js"></script>
  <script src="js/router.js"></script>
</body>
</html>
